name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  linux-hook:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Build Linux hook binary
        run: cargo build -p deva-light-hook --release --locked

      - name: Package hook release files
        run: |
          mkdir -p dist
          cp target/release/deva-light-hook dist/
          cp scripts/install-ubuntu-hook.sh dist/
          chmod +x dist/deva-light-hook dist/install-ubuntu-hook.sh

      - name: Upload Linux hook artifacts
        uses: softprops/action-gh-release@v3
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            dist/deva-light-hook
            dist/install-ubuntu-hook.sh

  release:
    needs: linux-hook
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target universal-apple-darwin'
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Build bundled hook (macOS universal)
        if: matrix.platform == 'macos-latest'
        run: |
          rustup target add aarch64-apple-darwin x86_64-apple-darwin
          cargo build -p deva-light-hook --release --locked --target aarch64-apple-darwin
          cargo build -p deva-light-hook --release --locked --target x86_64-apple-darwin
          mkdir -p target/release
          lipo -create \
            -output target/release/deva-light-hook \
            target/aarch64-apple-darwin/release/deva-light-hook \
            target/x86_64-apple-darwin/release/deva-light-hook
          chmod +x target/release/deva-light-hook

      - name: Build bundled hook (Windows)
        if: matrix.platform == 'windows-latest'
        run: cargo build -p deva-light-hook --release --locked

      - name: Install frontend dependencies
        run: npm ci --no-audit --no-fund

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Deva Light ${{ github.ref_name }}'
          releaseBody: |
            ## v0.2.1

            - 修复 Cursor 单任务误显示多条无用会话：subagent/generation UUID 不再单独建灯，transcript 兜底仅恢复 5 分钟内且同项目不重复。
            - 修复 Cursor 会话误标为 Claude：hook 与 HTTP 服务端按事件类型和 payload 特征正确识别 Cursor，优先使用 `conversation_id`。
            - 修复 Cursor「Run in background」等 shell 确认不再跳黄灯：`preToolUse` 的 shell 类工具恢复为 Waiting（黄灯），Read 等仍保持 Working（绿灯）。

            完整历史见 [CHANGELOG.md](https://github.com/wybyMrH/Deva_Light/blob/main/CHANGELOG.md)。
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          updaterJsonPreferNsis: true
          args: ${{ matrix.args }} -- --locked
