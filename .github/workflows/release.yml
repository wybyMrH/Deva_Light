name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  linux-hook:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Build Linux hook binary
        run: cargo build -p deva-light-hook --release --locked

      - name: Package hook release files
        run: |
          mkdir -p dist
          cp target/release/deva-light-hook dist/
          cp scripts/install-ubuntu-hook.sh dist/
          chmod +x dist/deva-light-hook dist/install-ubuntu-hook.sh

      - name: Upload Linux hook artifacts
        uses: softprops/action-gh-release@v3
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            dist/deva-light-hook
            dist/install-ubuntu-hook.sh

  release:
    needs: linux-hook
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target universal-apple-darwin'
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Build bundled hook (macOS universal)
        if: matrix.platform == 'macos-latest'
        run: |
          rustup target add aarch64-apple-darwin x86_64-apple-darwin
          cargo build -p deva-light-hook --release --locked --target aarch64-apple-darwin
          cargo build -p deva-light-hook --release --locked --target x86_64-apple-darwin
          mkdir -p target/release
          lipo -create \
            -output target/release/deva-light-hook \
            target/aarch64-apple-darwin/release/deva-light-hook \
            target/x86_64-apple-darwin/release/deva-light-hook
          chmod +x target/release/deva-light-hook

      - name: Build bundled hook (Windows)
        if: matrix.platform == 'windows-latest'
        run: cargo build -p deva-light-hook --release --locked

      - name: Install frontend dependencies
        run: npm ci --no-audit --no-fund

      - name: Extract release notes
        id: release_notes
        shell: bash
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          python <<'PY'
          import os
          from pathlib import Path

          lines = Path("CHANGELOG.md").read_text(encoding="utf-8").splitlines()
          sections = []
          current = None
          body = []

          for line in lines:
              if line.startswith("## "):
                  if current is not None:
                      sections.append((current, body))
                  current = line[3:].strip()
                  body = []
              elif current is not None:
                  body.append(line)

          if current is not None:
              sections.append((current, body))

          ref_name = os.environ.get("REF_NAME", "").strip()
          selected = None
          for header, section_body in sections:
              if ref_name and header.startswith(ref_name):
                  selected = section_body
                  break

          if selected is None and sections:
              selected = sections[0][1]

          text = "\n".join(selected or []).strip()
          footer = "完整历史见 [CHANGELOG.md](https://github.com/wybyMrH/Deva_Light/blob/main/CHANGELOG.md)。"
          if text:
              text = f"{text}\n\n{footer}"
          else:
              text = footer

          output_path = Path(os.environ["GITHUB_OUTPUT"])
          delimiter = "__DEVA_LIGHT_RELEASE_NOTES__"

          with output_path.open("a", encoding="utf-8", newline="\n") as handle:
              handle.write(f"body<<{delimiter}\n")
              handle.write(text)
              if text and not text.endswith("\n"):
                  handle.write("\n")
              handle.write(f"{delimiter}\n")
          PY

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Deva Light ${{ github.ref_name }}'
          releaseBody: ${{ steps.release_notes.outputs.body }}
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          updaterJsonPreferNsis: true
          args: ${{ matrix.args }} -- --locked
