name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  linux-hook:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Build Linux hook binary
        run: cargo build -p deva-light-hook --release

      - name: Package hook release files
        run: |
          mkdir -p dist
          cp target/release/deva-light-hook dist/
          cp scripts/install-ubuntu-hook.sh dist/
          chmod +x dist/deva-light-hook dist/install-ubuntu-hook.sh

      - name: Upload Linux hook artifacts
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            dist/deva-light-hook
            dist/install-ubuntu-hook.sh

  release:
    needs: linux-hook
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target universal-apple-darwin'
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Build bundled hook (macOS universal)
        if: matrix.platform == 'macos-latest'
        run: |
          rustup target add aarch64-apple-darwin x86_64-apple-darwin
          cargo build -p deva-light-hook --release --target aarch64-apple-darwin
          cargo build -p deva-light-hook --release --target x86_64-apple-darwin
          mkdir -p target/release
          lipo -create \
            -output target/release/deva-light-hook \
            target/aarch64-apple-darwin/release/deva-light-hook \
            target/x86_64-apple-darwin/release/deva-light-hook
          chmod +x target/release/deva-light-hook

      - name: Build bundled hook (Windows)
        if: matrix.platform == 'windows-latest'
        run: cargo build -p deva-light-hook --release

      - name: Install frontend dependencies
        run: npm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Deva Light ${{ github.ref_name }}'
          releaseBody: 'See CHANGELOG.md for details.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
